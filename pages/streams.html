<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Streams - PinkyDevil</title>

  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/streams.css"/>
</head>
<body>

<div class="streamsBg"></div>

<div class="pageShell">

  <!-- NAV -->
  <nav class="topNav">
    <a href="../index.html" class="navLogoWrap">
      <img src="../images/logo.png" class="navLogo"/>
    </a>

    <div class="navLinks">
      <a href="about.html" class="navButton">about</a>
      <a href="projects.html" class="navButton">projects</a>
      <a href="streams.html" class="navButton active">streams</a>
      <a href="music.html" class="navButton">music</a>
      <a href="fursona.html" class="navButton">fursona</a>
      <a href="art.html" class="navButton">art</a>
      <a href="chat.html" class="navButton">chat</a>
      <a href="donated.html" class="navButton">donated</a>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="streamsHeader">
    <span class="streamsTiny">streaming room</span>
    <h1 class="streamsTitle">Streams</h1>
    <p class="streamsSubtitle">
      live stream status, preview, and cute streaming vibes 💗
    </p>
  </header>

  <!-- MAIN -->
  <main class="streamsScene">

    <div class="mainMonitor" id="mainMonitorCard">

      <div class="windowBar">
        <span class="windowTitle">live_monitor.exe</span>
      </div>

      <div class="monitorScreen">

        <div class="streamTopBar">
          <span id="liveBadge" class="liveBadge offline">offline</span>
          <span id="streamStatusText">checking...</span>
        </div>

        <div class="videoFrame">
          <iframe
            id="streamEmbed"
            src="https://player.twitch.tv/?channel=pinkydevi&parent=bigdaddylumberjaker-create.github.io&muted=true"
            allowfullscreen>
          </iframe>
        </div>

        <div class="monitorFooter">
          <span id="streamViewerText">viewer info unavailable</span>
        </div>

      </div>
    </div>

    <div class="statusWidget">
      <h3 id="streamStatusTitle">offline</h3>
      <p id="streamStatusDescription">
        stream not live right now
      </p>
    </div>

    <div class="thumbnailWrap">
      <img id="streamThumbnail" src="../images/stream-placeholder.png"/>
    </div>

  </main>

</div>

<!-- IMPORTANT: no main.js -->
<script src="../js/streams-live.js"></script>

</body>
</html>
