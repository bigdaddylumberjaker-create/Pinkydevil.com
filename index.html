<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkyDevil</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />

  <style>
    #loader {
      isolation: isolate;
    }

    .introBg {
      z-index: 0;
      pointer-events: none;
    }

    #cloudIntro {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    #cloudIntro canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      pointer-events: none !important;
    }

    .loaderCenter {
      position: relative;
      z-index: 50;
      pointer-events: auto;
    }

    #logoIntro {
      pointer-events: none;
    }

    #enterButton {
      position: relative;
      z-index: 9999;
      pointer-events: auto !important;
      cursor: pointer;
    }

    #physicsCanvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none !important;
    }

    #loader::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 34%),
        radial-gradient(circle at center, rgba(255, 120, 190, 0.10), transparent 62%),
        linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.22));
      mix-blend-mode: screen;
    }

    .loaderCenter::before {
      content: "";
      position: absolute;
      width: 560px;
      height: 560px;
      max-width: 92vw;
      max-height: 92vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 166, 214, 0.20), transparent 62%);
      filter: blur(28px);
      z-index: -1;
      animation: introCorePulse 5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes introCorePulse {
      0%, 100% {
        transform: scale(0.96);
        opacity: 0.55;
      }
      50% {
        transform: scale(1.08);
        opacity: 0.92;
      }
    }
  </style>

  <script>
    window.onIntroEnter = function () {
      const loader = document.getElementById("loader");
      const hero = document.querySelector(".hero");
      const logo = document.getElementById("logoIntro");
      const button = document.getElementById("enterButton");

      if (!loader || loader.dataset.exiting === "1") return;
      loader.dataset.exiting = "1";

      if (logo) {
        logo.style.transition = "transform 0.7s ease, opacity 0.7s ease";
        logo.style.transform = "translateY(-14px) scale(0.95)";
        logo.style.opacity = "0.22";
      }

      if (button) {
        button.disabled = true;
        button.style.transform = "scale(0.96)";
        button.style.opacity = "0.5";
      }

      loader.style.opacity = "0";
      loader.style.pointerEvents = "none";

      if (hero) {
        setTimeout(() => {
          hero.classList.add("visible");
        }, 180);
      }

      setTimeout(() => {
        loader.style.display = "none";
      }, 950);
    };

    window.addEventListener("keydown", (event) => {
      const loader = document.getElementById("loader");
      if (!loader || loader.style.display === "none") return;
      if (event.key === "Enter") {
        window.onIntroEnter();
      }
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>
</head>
<body>

  <div id="loader">
    <div class="introBg">
      <div class="introGlow introGlow1"></div>
      <div class="introGlow introGlow2"></div>
      <div class="introGlow introGlow3"></div>

      <div class="aurora aurora1"></div>
      <div class="aurora aurora2"></div>

      <div class="lightBeam beam1"></div>
      <div class="lightBeam beam2"></div>

      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>

      <div class="sparkles">
        <span class="spark s1"></span>
        <span class="spark s2"></span>
        <span class="spark s3"></span>
        <span class="spark s4"></span>
        <span class="spark s5"></span>
        <span class="spark s6"></span>
        <span class="spark s7"></span>
        <span class="spark s8"></span>

        <span class="star st1">✦</span>
        <span class="star st2">✦</span>
        <span class="star st3">✦</span>
        <span class="star st4">✦</span>
        <span class="star st5">✦</span>
      </div>
    </div>

    <div id="cloudIntro" aria-hidden="true"></div>

    <div class="loaderCenter">
      <img src="images/logo.png" id="logoIntro" alt="PinkyDevil logo" />
      <button
        id="enterButton"
        type="button"
        onclick="window.onIntroEnter()"
      >
        enter
      </button>
    </div>

    <canvas id="physicsCanvas"></canvas>
  </div>

  <div class="homeBg">
    <div class="bgBlob blob1"></div>
    <div class="bgBlob blob2"></div>
    <div class="bgBlob blob3"></div>
    <div class="bgGrid"></div>

    <div class="bgHearts">
      <span class="miniHeart h1">♡</span>
      <span class="miniHeart h2">♡</span>
      <span class="miniHeart h3">♡</span>
      <span class="miniHeart h4">♡</span>
      <span class="miniHeart h5">♡</span>
      <span class="miniHeart h6">♡</span>
    </div>
  </div>

  <section class="hero">
    <div class="heroCenter">
      <span class="heroTiny">welcome to</span>
      <h1 class="heroMainTitle">PinkyDevil</h1>
      <p class="heroLead">
        a dreamy little pink universe for streams, projects, music, art, and cute chaos 💗
      </p>

      <div class="heartScene">
        <svg class="heartSvg" viewBox="0 0 600 540" aria-hidden="true">
          <defs>
            <linearGradient id="heartFill" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffc9e6" stop-opacity="1" />
              <stop offset="55%" stop-color="#ff9fd3" stop-opacity="0.92" />
              <stop offset="100%" stop-color="#ff6fb3" stop-opacity="0.8" />
            </linearGradient>

            <filter id="heartGlow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="10" result="blur1"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="blur1"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
          </defs>

          <path
            d="M300 496
               C268 468, 90 345, 50 226
               C19 132, 71 55, 154 40
               C222 28, 271 66, 300 110
               C329 66, 378 28, 446 40
               C529 55, 581 132, 550 226
               C510 345, 332 468, 300 496 Z"
            fill="url(#heartFill)"
            stroke="#ff6fb3"
            stroke-width="10"
            filter="url(#heartGlow)">
          </path>

          <path
            d="M300 470
               C272 446, 121 340, 87 236
               C60 152, 103 89, 171 77
               C227 67, 267 100, 300 145
               C333 100, 373 67, 429 77
               C497 89, 540 152, 513 236
               C479 340, 328 446, 300 470 Z"
            fill="rgba(255,255,255,0.14)">
          </path>
        </svg>

        <div class="heartContent">
          <p class="heartMiniLine">pick a page and explore</p>

          <div class="heroButtons">
            <a href="pages/about.html" class="btn btn-about">About</a>
            <a href="pages/projects.html" class="btn btn-projects">Projects</a>
            <a href="pages/streams.html" class="btn btn-streams">Streams</a>
            <a href="pages/music.html" class="btn btn-music">Music</a>
            <a href="pages/fursona.html" class="btn btn-fursona">Fursona</a>
            <a href="pages/art.html" class="btn btn-art">Art</a>
            <a href="pages/chat.html" class="btn btn-chat">Chat</a>
            <a href="pages/donated.html" class="btn btn-donated">Donated</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/intro.js"></script>
  <script src="js/ui-polish.js"></script>
</body>
</html>
