<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkyDevil</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />

  <style>
    #cloudIntro {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .loaderCenter {
      position: relative;
      z-index: 3;
    }

    #loader::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,120,190,0.12), transparent 60%);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 2;
    }
  </style>

  <!-- THREE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r155/three.min.js"></script>

  <!-- POST PROCESSING -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.155/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.155/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.155/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>

<body>

<div id="loader">
  <div id="cloudIntro"></div>

  <div class="loaderCenter">
    <img src="images/logo.png" id="logoIntro" />
    <button id="enterButton">enter</button>
  </div>
</div>

<section class="hero">
  <h1>PinkyDevil</h1>
</section>

<script src="js/intro.js"></script>

</body>
</html>
