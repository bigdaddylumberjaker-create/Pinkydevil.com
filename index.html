<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkyDevil</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />

  <!-- NEW (safe) -->
  <link rel="stylesheet" href="css/global-vfx.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

  <!-- 🌌 GLOBAL BG (safe, behind everything) -->
  <div class="vfxBg">
    <div class="vfxStars"></div>
  </div>

  <!-- INTRO / LOADER -->
  <div id="loader">
    <div class="introBg">
      <div class="introGlow introGlow1"></div>
      <div class="introGlow introGlow2"></div>
      <div class="introGlow introGlow3"></div>

      <div class="aurora aurora1"></div>
      <div class="aurora aurora2"></div>

      <div class="lightBeam beam1"></div>
      <div class="lightBeam beam2"></div>

      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>

      <div class="sparkles">
        <span class="spark s1"></span>
        <span class="spark s2"></span>
        <span class="spark s3"></span>
        <span class="spark s4"></span>
        <span class="spark s5"></span>
        <span class="spark s6"></span>
        <span class="spark s7"></span>
        <span class="spark s8"></span>

        <span class="star st1">✦</span>
        <span class="star st2">✦</span>
        <span class="star st3">✦</span>
        <span class="star st4">✦</span>
        <span class="star st5">✦</span>
      </div>
    </div>

    <div class="loaderCenter">
      <img src="images/logo.png" id="logoIntro" alt="PinkyDevil logo" />
      <button id="enterButton">enter</button>
    </div>

    <canvas id="physicsCanvas"></canvas>
  </div>

  <!-- MAIN CONTENT -->
  <div class="pageFade">

    <!-- HOME BACKGROUND -->
    <div class="homeBg">
      <div class="bgBlob blob1"></div>
      <div class="bgBlob blob2"></div>
      <div class="bgBlob blob3"></div>
      <div class="bgGrid"></div>

      <div class="bgHearts">
        <span class="miniHeart h1">♡</span>
        <span class="miniHeart h2">♡</span>
        <span class="miniHeart h3">♡</span>
        <span class="miniHeart h4">♡</span>
        <span class="miniHeart h5">♡</span>
        <span class="miniHeart h6">♡</span>
      </div>
    </div>

    <!-- HERO -->
    <section class="hero">
      <div class="heroCenter">
        <span class="heroTiny">welcome to</span>
        <h1 class="heroMainTitle">PinkyDevil</h1>

        <p class="heroLead">
          a dreamy little pink universe for streams, projects, music, art, and cute chaos 💗
        </p>

        <div class="heartScene">
          <svg class="heartSvg" viewBox="0 0 600 540">
            <path
              d="M300 496 C268 468, 90 345, 50 226 C19 132, 71 55, 154 40 C222 28, 271 66, 300 110 C329 66, 378 28, 446 40 C529 55, 581 132, 550 226 C510 345, 332 468, 300 496 Z"
              fill="#ff9fd3"
              stroke="#ff6fb3"
              stroke-width="10">
            </path>
          </svg>

          <div class="heartContent">
            <p class="heartMiniLine">pick a page and explore</p>

            <div class="heroButtons">
              <a href="pages/about.html" class="btn vfxBtn">About</a>
              <a href="pages/projects.html" class="btn vfxBtn">Projects</a>
              <a href="pages/streams.html" class="btn vfxBtn">Streams</a>
              <a href="pages/music.html" class="btn vfxBtn">Music</a>
              <a href="pages/fursona.html" class="btn vfxBtn">Fursona</a>
              <a href="pages/art.html" class="btn vfxBtn">Art</a>
              <a href="pages/chat.html" class="btn vfxBtn">Chat</a>
              <a href="pages/donated.html" class="btn vfxBtn">Donated</a>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <!-- ORIGINAL SCRIPTS -->
  <script src="js/main.js"></script>
  <script src="js/intro.js"></script>

  <!-- NEW SAFE SCRIPT -->
  <script src="js/global-vfx.js"></script>

</body>
</html>
