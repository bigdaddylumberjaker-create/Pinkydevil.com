<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkyDevil</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

  <!-- INTRO -->
  <div id="loader">
    <div class="introBg">
      <div class="introGlow introGlow1"></div>
      <div class="introGlow introGlow2"></div>
      <div class="introGlow introGlow3"></div>

      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>

      <div class="sparkles">
        <span class="spark s1"></span>
        <span class="spark s2"></span>
        <span class="spark s3"></span>
        <span class="spark s4"></span>
        <span class="spark s5"></span>
        <span class="spark s6"></span>
        <span class="spark s7"></span>
        <span class="spark s8"></span>
      </div>
    </div>

    <div class="loaderCenter">
      <img src="images/logo.png" id="logoIntro" alt="PinkyDevil logo" />
      <button id="enterButton">enter</button>
    </div>

    <canvas id="physicsCanvas"></canvas>
  </div>

  <!-- HOME BACKGROUND -->
  <div class="homeBg">
    <div class="bgBlob blob1"></div>
    <div class="bgBlob blob2"></div>
    <div class="bgBlob blob3"></div>
    <div class="bgGrid"></div>
    <div class="bgHearts">
      <span class="miniHeart h1">♡</span>
      <span class="miniHeart h2">♡</span>
      <span class="miniHeart h3">♡</span>
      <span class="miniHeart h4">♡</span>
      <span class="miniHeart h5">♡</span>
      <span class="miniHeart h6">♡</span>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="heartScene">

      <svg class="heartSvg" viewBox="0 0 600 540" aria-hidden="true">
        <defs>
          <linearGradient id="heartFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe6f4" stop-opacity="0.82" />
            <stop offset="50%" stop-color="#ffcde8" stop-opacity="0.48" />
            <stop offset="100%" stop-color="#ff9fd3" stop-opacity="0.28" />
          </linearGradient>

          <linearGradient id="heartStroke" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff2fa" />
            <stop offset="100%" stop-color="#ffb6e0" />
          </linearGradient>

          <filter id="heartGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="10" result="blur1"/>
            <feColorMatrix
              in="blur1"
              type="matrix"
              values="1 0 0 0 0
                      0 0.72 0 0 0
                      0 0.88 0 0 0
                      0 0 0 1 0"
              result="pinkGlow"/>
            <feMerge>
              <feMergeNode in="pinkGlow"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <path
          d="M300 496
             C268 468, 90 345, 50 226
             C19 132, 71 55, 154 40
             C222 28, 271 66, 300 110
             C329 66, 378 28, 446 40
             C529 55, 581 132, 550 226
             C510 345, 332 468, 300 496 Z"
          fill="url(#heartFill)"
          stroke="url(#heartStroke)"
          stroke-width="8"
          filter="url(#heartGlow)"
        />

        <path
          d="M300 470
             C272 446, 121 340, 87 236
             C60 152, 103 89, 171 77
             C227 67, 267 100, 300 145
             C333 100, 373 67, 429 77
             C497 89, 540 152, 513 236
             C479 340, 328 446, 300 470 Z"
          fill="rgba(255,255,255,0.08)"
        />
      </svg>

      <div class="heartContent">
        <h1 class="heroTitle">PinkyDevil</h1>
        <p class="heroSubtitle">femboy • furry • developer • sax player</p>

        <div class="heroButtons">
          <a href="pages/about.html" class="btn btn-about">About</a>
          <a href="pages/projects.html" class="btn btn-projects">Projects</a>
          <a href="pages/streams.html" class="btn btn-streams">Streams</a>
          <a href="pages/music.html" class="btn btn-music">Music</a>
          <a href="pages/chat.html" class="btn btn-chat">Chat</a>
          <a href="pages/donated.html" class="btn btn-donated">Donated</a>
        </div>
      </div>

    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/intro.js"></script>
</body>
</html>
