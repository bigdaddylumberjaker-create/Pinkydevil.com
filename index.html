<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinkyDevil</title>

  <!-- LOAD ORDER MATTERS -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/site-magic.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

  <!-- INTRO / LOADER -->
  <div id="loader">
    <div class="introBg">
      <div class="introGlow introGlow1"></div>
      <div class="introGlow introGlow2"></div>
      <div class="introGlow introGlow3"></div>

      <div class="aurora aurora1"></div>
      <div class="aurora aurora2"></div>

      <div class="lightBeam beam1"></div>
      <div class="lightBeam beam2"></div>

      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>

      <div class="sparkles">
        <span class="spark s1"></span>
        <span class="spark s2"></span>
        <span class="spark s3"></span>
        <span class="spark s4"></span>
        <span class="spark s5"></span>
        <span class="spark s6"></span>
        <span class="spark s7"></span>
        <span class="spark s8"></span>

        <span class="star st1">✦</span>
        <span class="star st2">✦</span>
        <span class="star st3">✦</span>
        <span class="star st4">✦</span>
        <span class="star st5">✦</span>
      </div>
    </div>

    <div class="loaderCenter">
      <img src="images/logo.png" id="logoIntro" alt="PinkyDevil logo" />
      <button id="enterButton" type="button">enter</button>
    </div>

    <canvas id="physicsCanvas"></canvas>
  </div>

  <!-- HOME BACKGROUND -->
  <div class="homeBg">
    <div class="homeNebula nebula1"></div>
    <div class="homeNebula nebula2"></div>
    <div class="homeNebula nebula3"></div>

    <div class="homeCloud cloud1"></div>
    <div class="homeCloud cloud2"></div>
    <div class="homeCloud cloud3"></div>
    <div class="homeCloud cloud4"></div>

    <div class="homeStars">
      <span class="homeStar">✦</span>
      <span class="homeStar">✦</span>
      <span class="homeStar">✦</span>
      <span class="homeStar">✦</span>
      <span class="homeStar">✦</span>
    </div>

    <div class="homeHearts">
      <span class="miniHeart">♡</span>
      <span class="miniHeart">♡</span>
      <span class="miniHeart">♡</span>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="heroCenter">
      <span class="heroTiny">welcome to</span>
      <h1 class="heroMainTitle">PinkyDevil</h1>

      <p class="heroLead">
        a cute pink fluffy cloud world full of streams, music, projects, art, and dreamy little chaos 💗
      </p>

      <div class="homePortal">

        <div class="homeStatusBar">
          <div class="homeStatusPill">
            <span id="homeLiveBadge" class="homeLiveBadge offline">offline</span>
            <span id="homeLiveText" class="homeLiveText">currently offline</span>
          </div>
        </div>

        <div class="portalButtons">
          <div class="heroButtons">
            <a href="pages/about.html" class="btn">About</a>
            <a href="pages/projects.html" class="btn">Projects</a>
            <a href="pages/streams.html" class="btn">Streams</a>
            <a href="pages/music.html" class="btn">Music</a>
            <a href="pages/fursona.html" class="btn">Fursona</a>
            <a href="pages/art.html" class="btn">Art</a>
            <a href="pages/chat.html" class="btn">Chat</a>
            <a href="pages/donated.html" class="btn">Donated</a>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- FIXED INTRO SCRIPT -->
  <script>
    window.forceEnterHome = function () {
      const loader = document.getElementById("loader");
      const hero = document.querySelector(".hero");

      if (!loader || loader.dataset.exiting === "1") return;
      loader.dataset.exiting = "1";

      loader.style.opacity = "0";
      loader.style.pointerEvents = "none";

      setTimeout(() => {
        loader.style.display = "none";
        if (hero) hero.classList.add("visible");
      }, 900);
    };

    window.addEventListener("DOMContentLoaded", () => {
      const button = document.getElementById("enterButton");
      if (button) {
        button.addEventListener("click", window.forceEnterHome);
      }
    });
  </script>

  <!-- IMPORTANT ORDER -->
  <script src="js/main.js"></script>
  <script src="js/intro.js"></script>
  <script src="js/home-live.js"></script>
  <script src="js/site-magic.js"></script>

</body>
</html>
